[phases.setup]
nixPkgs = ["nodejs_18", "chromium", "nss", "freetype", "harfbuzz"]

[phases.build]
cmds = ["npm install", "cd dashboard && npm install && npm run build"]

[start]
cmd = "node server/index.js"

[variables]
PUPPETEER_EXECUTABLE_PATH = "/root/.nix-profile/bin/chromium"
NODE_ENV = "production"
