[phases.setup]
nixPkgs = ["chromium", "nss", "freetype", "harfbuzz", "ca-certificates", "ttf-freefont"]

[phases.build]
cmds = ["npm install", "cd dashboard && npm install && npm run build"]

[start]
cmd = "node server/index.js"

[variables]
PUPPETEER_EXECUTABLE_PATH = "/nix/store/chromium/bin/chromium"
NODE_ENV = "production"
